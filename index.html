<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssinia HealthSuite | Premium Clinical Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clinic: {
                            navy: '#0f172a',
                            emerald: '#059669',
                            soft: '#f8fafc'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-clinic-soft text-slate-800">

    <!-- 1. REFINED LUXURY HEADER -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            
            <!-- Logo -->
            <div class="flex items-center space-x-2">
                <div class="bg-clinic-emerald text-white p-2 rounded-lg">
                    <i class="fa-solid fa-plus font-bold"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-clinic-navy">ABYSSINIA<span class="font-light text-slate-400">CLINIC</span></span>
            </div>

            <!-- Desktop Nav -->
            <div class="hidden md:flex items-center space-x-8 text-sm font-semibold text-slate-600">
                <a href="#" class="hover:text-clinic-emerald transition">Services</a>
                <a href="#" class="hover:text-clinic-emerald transition">Doctors</a>
                <a href="#" class="hover:text-clinic-emerald transition">Locations</a>
                <a href="#" class="bg-clinic-navy text-white px-6 py-2.5 rounded-full hover:bg-slate-800 transition">Book Appointment</a>
            </div>

            <!-- Hamburger Button -->
            <button id="menu-btn" class="md:hidden text-2xl text-clinic-navy">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- 2. MOBILE HAMBURGER MENU (Hidden by default) -->
    <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-slate-200 p-6 space-y-4 text-clinic-navy font-bold">
        <a href="#" class="block py-2 border-b">Services</a>
        <a href="#" class="block py-2 border-b">Doctors</a>
        <a href="#" class="block py-2 border-b">Emergency Care</a>
        <a href="#" class="block py-2 border-b">Patient Portal</a>
        <a href="#" class="block py-4 text-clinic-emerald">Book Appointment Now</a>
    </div>

    <!-- 3. REFINED HERO SECTION (Less Cramped) -->
    <section class="max-w-5xl mx-auto px-6 py-20 text-center">
        <h1 class="text-5xl md:text-6xl font-extrabold text-clinic-navy leading-tight mb-6">
            Elite Medical Care <br>
            <span class="text-clinic-emerald">Designed for You.</span>
        </h1>
        <p class="text-lg text-slate-500 max-w-2xl mx-auto mb-10 leading-relaxed">
            Experience world-class diagnostics and compassionate specialist care in the heart of Addis Ababa. 
        </p>
        <div class="flex flex-col sm:flex-row justify-center gap-4">
            <button class="bg-clinic-emerald text-white px-8 py-4 rounded-xl font-bold hover:bg-emerald-700 transition shadow-lg shadow-emerald-200">Book Your Visit</button>
            <button class="bg-white text-clinic-navy border border-slate-200 px-8 py-4 rounded-xl font-bold hover:bg-slate-50 transition">Emergency Call</button>
        </div>
    </section>

    <script>
        const btn = document.getElementById('menu-btn');
        const menu = document.getElementById('mobile-menu');
        
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
        });
    </script>
</body>
</html>
